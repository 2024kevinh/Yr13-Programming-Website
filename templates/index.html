{% extends "base.html" %}

{% block content %}

<section class="feed">
    {% for prompt in prompts %}
    <div class="card">
        <img src="{{ prompt.image_url }}" alt="Generated Image">
        <div class="card-content">
            <h3>{{ prompt.title }}</h3>
            <p class="creator">@{{ prompt.creator }}</p>
            <div class="stats">
                <!-- show average_rating if available, otherwise legacy rating -->
                <span>⭐ {{ prompt.average_rating or prompt.rating }}</span>
                <!-- show downloads if available, otherwise legacy likes -->
                <span>❤️ {{ prompt.downloads or prompt.likes }}</span>
            </div>
        </div>
    </div>
    {% endfor %}
</section>

{% endblock %}
